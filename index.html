<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FastWise</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="user-greeting">
                <span class="greeting-text">Good morning,</span>
                <h1 class="user-name">Faster!</h1>
            </div>
            <div class="header-actions">
                <button class="icon-button" aria-label="Notifications">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <!-- Timer Section -->
            <section class="timer-section">
                <div class="timer-card">
                    <div class="timer-ring-container">
                        <svg class="timer-ring" viewBox="0 0 200 200">
                            <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
                            <circle class="ring-progress" cx="100" cy="100" r="90" stroke-dasharray="565.48" stroke-dashoffset="565.48"></circle>
                        </svg>
                        <div class="timer-display">
                            <div class="time-label">Elapsed Time</div>
                            <div class="time-value" id="time-display">00:00:00</div>
                            <div class="fasting-goal">Goal: 16 Hours</div>
                        </div>
                    </div>
                    
                    <button class="primary-btn pulse" id="toggle-timer-btn">Start Fasting</button>
                </div>
            </section>

            <!-- Plans Section -->
            <section class="plans-section">
                <div class="section-header">
                    <h2>Fasting Plans</h2>
                </div>
                <div class="plans-grid">
                    <div class="plan-card glass active-plan" data-hours="16" data-title="16:8 Fast">
                        <div class="plan-title">16:8</div>
                        <div class="plan-desc">Skip Breakfast</div>
                    </div>
                    <div class="plan-card glass" data-hours="14" data-title="14:10 Fast">
                        <div class="plan-title">14:10</div>
                        <div class="plan-desc">Skip Breakfast</div>
                    </div>
                    <div class="plan-card glass" data-hours="23" data-title="OMAD Fast">
                        <div class="plan-title">23:1 (OMAD)</div>
                        <div class="plan-desc">One Meal A Day (Dinner)</div>
                    </div>
                    <div class="plan-card glass" data-hours="18" data-title="Power Week Fast">
                        <div class="plan-title">Power Week</div>
                        <div class="plan-desc">Helps losing weight</div>
                    </div>
                </div>
            </section>

            <!-- Stats Overview -->
            <section class="stats-section">
                <div class="section-header">
                    <h2>Recent Activity</h2>
                </div>
                <div class="stats-grid">
                    <div class="stat-card glass">
                        <div class="stat-icon">🔥</div>
                        <div class="stat-info">
                            <span class="stat-title">Current Streak</span>
                            <span class="stat-value">3 Days</span>
                        </div>
                    </div>
                    <div class="stat-card glass">
                        <div class="stat-icon">⏱️</div>
                        <div class="stat-info">
                            <span class="stat-title">Total Fasted</span>
                            <span class="stat-value">48 Hours</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-nav">
            <button class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                <span>Home</span>
            </button>
            <button class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path></svg>
                <span>Stats</span>
            </button>
            <button class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
